# Linter ayari (ChiefUI): satir uzunlugu 120, gereksiz uyarilari yoksay.
[flake8]
max-line-length = 120
extend-ignore = E501, E402, F401, W503, E203, E302, E305, E303, E741
exclude = .venv, node_modules, __pycache__

[pycodestyle]
max-line-length = 120
ignore = E501, E402, W503, E203, E302, E305, E303, E741
